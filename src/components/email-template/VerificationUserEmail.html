<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Your Clinsight Verification Code</title>
    <link rel="stylesheet" href="email-template.css" />
  </head>
  <body class="email-body">
    <!-- Subject: Your Clinsight Verification Code -->
    <div class="email-container">
      <h1 class="email-header">Your Clinsight Verification Code</h1>
      <div class="email-section text-center">
        <p class="email-small">Verification Code</p>
        <p class="email-header" style="font-size: 36px">{{pin}}</p>
      </div>
      <div class="alert-red">
        <p class="email-small">⚠️ Never share this code with anyone</p>
      </div>
      <div class="alert-yellow">
        <p class="email-small">This code will expire in {{expirationTime}}.</p>
      </div>
      <p class="email-small">
        If you did not request this, you can ignore this email.
      </p>
      <div class="email-footer">
        <p>The Clinsight Team</p>
        <p>© 2026 Clinsight. All rights reserved</p>
      </div>
    </div>
  </body>
</html>
