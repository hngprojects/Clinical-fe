name: CD

on:
  workflow_run:
    workflows: ["CI Workflow"]
    branches: [staging, main]
    types:
      - completed

jobs:
  deploy-staging:
    if: github.event.workflow_run.head_branch == 'staging' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e

            BRANCH="${{ github.event.workflow_run.head_branch }}"
            APP_DIR="/home/device_clinical_support/clinical-fe/staging"
            PM2_APP="clinical-fe-staging"
            PORT="3001"

            echo "Deploying branch $BRANCH to $APP_DIR"

            cd "$APP_DIR"

            git fetch origin
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            pnpm install --frozen-lockfile
            pnpm build

            if pm2 describe "$PM2_APP" > /dev/null 2>&1; then
              pm2 restart "$PM2_APP"
            else
              pm2 start "pnpm start -- -p $PORT" --name "$PM2_APP"
            fi

            pm2 save

  deploy-production:
    if: github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -e

            BRANCH="${{ github.event.workflow_run.head_branch }}"
            APP_DIR="/home/device_clinical_support/clinical-fe/prod"
            PM2_APP="clinical-fe-prod"
            PORT="3000"

            echo "Deploying branch $BRANCH to $APP_DIR"

            cd "$APP_DIR"

            git fetch origin
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            pnpm install --frozen-lockfile
            pnpm build

            if pm2 describe "$PM2_APP" > /dev/null 2>&1; then
              pm2 restart "$PM2_APP"
            else
              pm2 start "pnpm start -- -p $PORT" --name "$PM2_APP"
            fi

            pm2 save

 