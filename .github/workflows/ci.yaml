name: CI Workflow
on:
  push:
    branches: ["dev", "staging", "main"]
  pull_request:
    branches: ["dev", "staging", "main"]

jobs:
  build_lint_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Run lint
        run: pnpm lint

      - name: Build app
        run: pnpm build